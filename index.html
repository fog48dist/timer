<!DOCTYPE html>
<html lang="en">

<head>
    <title>Timer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="timer-svgrepo-com.svg" type="image/svg+xml">

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: hsl(0, 0%, 92%);
        }

        body>div {
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: none;
            font: 23vmin Arial, sans-serif;
            background-color: hsl(0, 0%, 84%);
        }

        #reverseDiv {
            height: 25vh;
            flex-direction: column;
        }

        #reverseDiv div:first-child {
            font-size: 0.6em;
        }

        #reverseDiv div:last-child {
            font-size: 0.3em;
        }

        #timeDiv {
            background-color: white;
            height: 30vh;
        }

        #startstop {
            height: 40vh;
        }
    </style>
</head>

<body>
    <div id="reverseDiv">
        <div>STOPWATCH</div>
        <div>TIMER</div>
    </div>
    <div id="timeDiv">
        <div>0</div>
        <div>:</div>
        <div six="true">0</div>
        <div>0</div>
        <div>:</div>
        <div six="true">0</div>
        <div>0</div>
        <div>.</div>
        <div>0</div>
    </div>
    <div id="startstop">START</div>
    <script>
        const print = console.log;
        const audio = new Audio("Bicycle-bell-1.opus");
        const timer = JSON.parse(localStorage.getItem('timer')) || { dt: 0, reverse: false }
        let intervalID,reversePressedTime,gestureStartY;
        function start(resume = false) {
            if (!intervalID) {
                if (!resume) timer.then = Date.now() - timer.dt * (timer.reverse ? -1 : 1);
                intervalID = setInterval(updTime, 100);
                startstop.innerText = 'STOP';
                reverseDiv.children[1].style.display = 'none'
            }
        }
        function stop() {
            if (intervalID) {
                intervalID = clearInterval(intervalID);
                delete timer.then;
                startstop.innerText = 'START'
                reverseDiv.children[1].style.display = ''
            }
        }
        
        function setTimeFields(n) {
            const h = ~~(n / 3600_000);
            const m = ~~(n / 60_000 - h * 60);
            const s = ~~(n / 1000 - h * 3600 - m * 60);
            timeDiv.children[0].innerText = h % 10;
            timeDiv.children[2].innerText = ~~(m / 10);
            timeDiv.children[3].innerText = m % 10;
            timeDiv.children[5].innerText = ~~(s / 10);
            timeDiv.children[6].innerText = s % 10;
            timeDiv.children[8].innerText = ~~((n / 100) % 10);
        }
        function updTime() {
            timer.dt = (timer.reverse ? -1 : 1) * (Date.now() - timer.then);
            if (timer.dt < 0) {
                timer.dt = 0;
                stop();
                audio.play();
            }
            setTimeFields(timer.dt)
        }

        if (timer.then) { start(1) } else { setTimeFields(timer.dt) }
        reverseDiv.children[+timer.reverse].innerText = "STOPWATCH";
        reverseDiv.children[+!timer.reverse].innerText = "TIMER";
        
        startstop.addEventListener("pointerdown", () => intervalID ? stop() : start());
        reverseDiv.addEventListener("pointerdown", function () {
            reversePressedTime=Date.now()
        });
        reverseDiv.addEventListener("pointerup", function () {
            if(!timer.then){
                if(Date.now()-reversePressedTime<800){
                    timer.reverse = !timer.reverse;
                    reverseDiv.children[1 * timer.reverse].innerText = "STOPWATCH"
                    reverseDiv.children[1 * !timer.reverse].innerText = "TIMER"
                }else{
                    setTimeFields(timer.dt=0)
                }
            }
        });
        for (const el of timeDiv.children) {
            if (isFinite(el.innerText)) {
                function cb(ee) {
                    const dy = ee.clientY - gestureStartY;
                    const threshold = 60;
                    if (dy > threshold) {
                        el.innerText++;
                        gestureStartY += threshold;
                    }
                    if (dy < -threshold) {
                        el.innerText--;
                        gestureStartY -= threshold;
                    }
                    const n = el.innerText;
                    if (el.getAttribute("six") === "true") {
                        el.innerText = n > 5 ? 0 : n < 0 ? 5 : n;
                    } else {
                        el.innerText = n > 9 ? 0 : n < 0 ? 9 : n;
                    }
                    timer.dt =
                        timeDiv.children[0].innerText * 3.6e6 +
                        timeDiv.children[2].innerText * 6e5 +
                        timeDiv.children[3].innerText * 6e4 +
                        timeDiv.children[5].innerText * 1e4 +
                        timeDiv.children[6].innerText * 1e3 +
                        timeDiv.children[8].innerText * 1e2

                }
                el.addEventListener("pointerdown", (e) => {
                    if (!intervalID) {
                        gestureStartY = e.clientY;
                        document.body.addEventListener("pointermove", cb);
                    }
                });
                document.body.addEventListener("pointerup", (e) => {
                    document.body.removeEventListener("pointermove", cb);
                });
            }
        }
        document.onvisibilitychange = e => {
            if (document.visibilityState == 'hidden') {
                localStorage.setItem("timer", JSON.stringify(timer))
            }
        }
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker
                    .register("/timer/sw.js", { scope: "." })
                    .then((res) => console.log("service worker registered"))
                    .catch((err) => console.log("service worker not registered", err));
            });
        }
    </script>
</body>

</html>
